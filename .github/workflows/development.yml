name: Apurid Quality Control

on:
  push:
    branches: [ developer ]
  pull_request:
    branches: [ testing, main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # La misma que usa Cloudflare

      - name: Install dependencies
        run: npm install

      - name: Check Build
        run: npm run build
        
      # Aquí puedes añadir un linter o auditoría de seguridad después

